<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregnancy Week Ring v4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0C0A1E;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    font-family: Georgia, serif; color: #fff; overflow-x: hidden;
  }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .phone-frame {
    width: 390px; max-width: 100vw; min-height: 100vh;
    background: #0E0B22; position: relative; z-index: 1;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .header {
    padding: 52px 24px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .header-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .tabs {
    display: flex; margin: 0 20px 0;
    background: rgba(255,255,255,0.06); border-radius: 99px; padding: 4px; gap: 2px;
  }
  .tab {
    flex: 1; text-align: center; padding: 8px 4px; border-radius: 99px;
    font-size: 13px; font-family: sans-serif; font-weight: 500;
    color: rgba(255,255,255,0.45); cursor: pointer;
  }
  .tab.active { background: #fff; color: #0E0B22; font-weight: 700; }

  .ring-wrap {
    display: flex; flex-direction: column; align-items: center;
    flex: 1; padding: 12px 0 16px;
  }
  #ring-canvas { cursor: grab; touch-action: none; user-select: none; display: block; }
  #ring-canvas:active { cursor: grabbing; }

  .hint {
    font-family: sans-serif; font-size: 10px;
    color: rgba(255,255,255,0.18); text-align: center; padding: 4px 0 0;
  }

  /* Compact strip at bottom */
  .weeks-strip {
    display: flex; gap: 3px; padding: 0 32px 20px; flex-wrap: wrap;
    justify-content: center;
  }
  .wdot { width: 5px; height: 5px; border-radius: 50%; transition: all 0.2s; }
</style>
</head>
<body>
<canvas class="stars" id="stars"></canvas>
<div class="phone-frame">
  <div class="header">
    <div class="header-title">Agenda.</div>
    <div style="display:flex;gap:8px">
      <div class="header-btn">🔔</div>
      <div class="header-btn" style="background:#B983FF22;border-color:#B983FF44;color:#B983FF;font-size:20px">+</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab">Timeline</div>
    <div class="tab active">Journey</div>
    <div class="tab">Appts</div>
  </div>

  <div class="ring-wrap">
    <canvas id="ring-canvas" width="370" height="370"></canvas>
    <div class="hint">↺ drag to spin · tap any week</div>
  </div>

  <div class="weeks-strip" id="weeks-strip"></div>
</div>

<script>
// Stars
(function() {
  const s = document.getElementById('stars'), c = s.getContext('2d');
  s.width = window.innerWidth; s.height = window.innerHeight;
  for (let i = 0; i < 130; i++) {
    c.beginPath(); c.arc(Math.random()*s.width, Math.random()*s.height, Math.random()*1.1, 0, Math.PI*2);
    c.fillStyle = `rgba(255,255,255,${0.1+Math.random()*0.3})`; c.fill();
  }
})();

const DUE_DATE  = new Date('2025-09-22');
const CURRENT_WEEK = 22;
const TOTAL = 40;

function weekDates(w) {
  const start = new Date(DUE_DATE);
  start.setDate(start.getDate() - (40 - w) * 7);
  const end = new Date(start); end.setDate(end.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return { start, end, short: fmt(start) + ' – ' + fmt(end),
    full: fmt(start) + ' – ' + fmt(end) + ', ' + end.getFullYear() };
}

function triColor(w) {
  if (w <= 13) return '#A2FF86';
  if (w <= 26) return '#B983FF';
  return '#FF6B35';
}

const NOTES = [
  'Fertilization occurs. A tiny cluster of cells begins dividing.',
  'The fertilized egg implants into the uterine wall.',
  'Cells multiply. The placenta begins to form.',
  'The neural tube — foundation of brain and spine — is forming.',
  "Baby's heart starts beating for the first time.",
  'Tiny facial features emerge. Nostrils, eyes, ear openings forming.',
  'Brain grows rapidly. Paddle-shaped hands and feet are visible.',
  "Baby moves — though you can't feel it yet. Fingers are visible.",
  'Toes are distinct. The embryo officially becomes a fetus.',
  'Vital organs are fully formed and beginning to work.',
  'Baby opens and closes fists. Hair follicles develop.',
  'Reflexes developing. Fingernails begin to grow.',
  'Unique fingerprints form. Baby can suck their thumb.',
  'Baby makes facial expressions. Kidneys produce urine.',
  'Bones harden. Baby senses light through closed eyelids.',
  'Baby practices breathing. First flutters may be felt.',
  'Fat forms under skin. Umbilical cord grows thicker.',
  'Baby yawns and hiccups. Ears are fully formed.',
  'Vernix caseosa coats skin for protection in the womb.',
  "Halfway! Baby's movements are growing stronger.",
  'Baby develops a sleep cycle. Eyebrows are visible.',
  'Baby hears sounds from outside. Eyes are opening.',
  'Skin less transparent as fat develops beneath it.',
  'Lungs develop rapidly. Baby viable if born now.',
  'Baby responds to touch and sound. Hair has color.',
  'Eyes open fully. Baby responds to belly light.',
  'Brain develops rapidly. Baby recognizes your voice.',
  'Third trimester! Baby blinks and has eyelashes.',
  'Muscles and lungs mature. Baby gains ~200g/week.',
  'Red blood cells form in marrow. Baby very active.',
  'Baby tracks light. Rapid brain development.',
  'Toenails, fingernails and hair are all growing.',
  'Skull bones soft — designed for birth.',
  'CNS and lungs are nearly mature.',
  'Baby filling out. Kidneys fully developed.',
  'Baby drops into pelvis. Almost ready!',
  'Early term. Baby practices breathing and sucking.',
  'All organs ready. Vernix sheds into amniotic fluid.',
  'Full-term. Could arrive any day. You are incredible.',
  'Due date! Baby is ready. You did it, Mama. ❤️',
];

const MOCK_LOGS = {
  5:['Weight'], 6:['Weight','Mood'], 7:['Weight'],
  8:['Weight','Mood','Symptom'], 9:['Weight','Symptom'],
  10:['Weight','Mood','Kick'], 11:['Weight','Symptom','Mood'],
  12:['Weight','Kick','Mood'], 13:['Weight','Mood'],
  14:['Weight','Kick'], 15:['Weight','Mood','Symptom','Kick'],
  16:['Weight','Kick','Mood'], 17:['Weight','Kick'],
  18:['Weight','Mood','Kick'], 19:['Weight','Kick','Mood','Symptom'],
  20:['Weight','Kick','Mood'], 21:['Weight','Kick','Mood','Appt'],
  22:['Weight','Kick','Appt'],
};
const LOG_COLORS = { Weight:'#A2FF86', Mood:'#B983FF', Kick:'#FF8AD8', Symptom:'#FF6B35', Appt:'#4D96FF' };

// ── Week dots strip
const stripEl = document.getElementById('weeks-strip');
for (let i = 1; i <= 40; i++) {
  const d = document.createElement('div');
  d.className = 'wdot'; d.id = 'wdot-' + i; stripEl.appendChild(d);
}
function updateStrip(sel) {
  for (let i = 1; i <= 40; i++) {
    const d = document.getElementById('wdot-' + i), col = triColor(i);
    if (i < CURRENT_WEEK) { d.style.background = col+'55'; d.style.width=d.style.height='5px'; d.style.boxShadow='none'; }
    else if (i === CURRENT_WEEK) { d.style.background = col; d.style.width=d.style.height='7px'; d.style.boxShadow='0 0 5px '+col; }
    else if (i === sel) { d.style.background = col+'77'; d.style.width=d.style.height='6px'; d.style.boxShadow='none'; }
    else { d.style.background='rgba(255,255,255,0.10)'; d.style.width=d.style.height='5px'; d.style.boxShadow='none'; }
  }
}

// ── Canvas setup
const canvas = document.getElementById('ring-canvas');
const ctx = canvas.getContext('2d');
const W = 370, H = 370, CX = 185, CY = 185;
const RING_R = 158;
const ANCHOR = Math.PI / 2;

let rotation = 0, selectedWeek = CURRENT_WEEK, pulseT = 0;

function initRot() {
  const base = ((CURRENT_WEEK-1)/TOTAL)*2*Math.PI - Math.PI/2;
  rotation = ANCHOR - base;
}
initRot();

function wAngle(i) { return (i/TOTAL)*2*Math.PI - Math.PI/2 + rotation; }

function orbR(i) {
  const w = i+1, isSel = w===selectedWeek, isCurr = w===CURRENT_WEEK;
  const base = w <= 13 ? 5.5 : w <= 26 ? 6.5 : 7.5;
  return isSel ? base+5 : (isCurr ? base+3 : base);
}

// ── Draw rounded rect helper
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r);
  ctx.closePath();
}

function drawCenter(w) {
  const col = triColor(w);
  const isCurr = w === CURRENT_WEEK;
  const isPast = w < CURRENT_WEEK;
  const dates = weekDates(w);
  const logs = MOCK_LOGS[w] || [];
  const note = NOTES[w-1];

  // Radial glow behind content
  const grd = ctx.createRadialGradient(CX, CY, 10, CX, CY, 110);
  grd.addColorStop(0, col+'18');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(CX, CY, 110, 0, Math.PI*2); ctx.fill();

  // Pulse ring (current week)
  if (isCurr) {
    const p = 0.45 + 0.55*Math.sin(pulseT);
    ctx.beginPath(); ctx.arc(CX, CY, 46 + p*10, 0, Math.PI*2);
    ctx.strokeStyle = col + Math.floor(p*55).toString(16).padStart(2,'0');
    ctx.lineWidth = 1.2; ctx.stroke();
  }

  // Layout: stack from CY-68 down
  let y = CY - 66;

  // Status eyebrow
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.font = '700 9px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.letterSpacing = '1.5px';
  ctx.fillText(isCurr ? 'YOU ARE HERE' : (isPast ? 'COMPLETED' : 'UPCOMING'), CX, y);
  y += 40;

  // Big week number
  ctx.shadowColor = col; ctx.shadowBlur = 12;
  ctx.fillStyle = '#fff';
  ctx.font = '800 52px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(w, CX, y);
  ctx.shadowBlur = 0;
  y += 30;

  // Date range
  ctx.fillStyle = col + 'dd';
  ctx.font = '600 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(dates.full, CX, y);
  y += 22;

  // Logged chips (draw inline as mini pill shapes)
  if (logs.length > 0) {
    const chipH = 18, chipPad = 10, chipGap = 6, dotR = 3;
    // Measure each chip width
    ctx.font = '600 9.5px sans-serif';
    const chips = logs.map(l => {
      const tw = ctx.measureText(l).width;
      return { label: l, color: LOG_COLORS[l] || '#fff', w: dotR*2 + 5 + tw + chipPad*2 };
    });
    const totalW = chips.reduce((s, c) => s + c.w, 0) + (chips.length-1)*chipGap;
    let cx0 = CX - totalW/2;
    chips.forEach(chip => {
      roundRect(cx0, y - chipH/2, chip.w, chipH, chipH/2);
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 1; ctx.stroke();
      // dot
      ctx.beginPath(); ctx.arc(cx0 + chipPad + dotR, y, dotR, 0, Math.PI*2);
      ctx.fillStyle = chip.color; ctx.fill();
      // label
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = '600 9.5px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(chip.label, cx0 + chipPad + dotR*2 + 5, y);
      cx0 += chip.w + chipGap;
    });
    y += 20;
  } else if (isPast || isCurr) {
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '500 10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(isCurr ? 'Nothing logged yet' : 'No logs this week', CX, y);
    y += 18;
  }

  y += 8;

  // Note text — wrap to ~2 lines inside the circle
  const noteWords = note.split(' ');
  const maxW = 190;
  ctx.font = '400 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(255,255,255,0.50)';
  let line = '', lines = [];
  noteWords.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = word; }
    else { line = test; }
  });
  if (line) lines.push(line);
  lines = lines.slice(0, 3); // max 3 lines
  const lineH = 15;
  lines.forEach((l, idx) => ctx.fillText(l, CX, y + idx * lineH));

  ctx.textBaseline = 'alphabetic';
  ctx.letterSpacing = '0px';
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Orbit track
  ctx.beginPath(); ctx.arc(CX, CY, RING_R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Draw orbs
  for (let i = 0; i < TOTAL; i++) {
    const w = i+1, angle = wAngle(i);
    const x = CX + RING_R*Math.cos(angle), y = CY + RING_R*Math.sin(angle);
    const col = triColor(w), r = orbR(i);
    const isFuture = w > CURRENT_WEEK, isSel = w===selectedWeek, isCurr = w===CURRENT_WEEK;

    ctx.shadowBlur = 0;

    if (isSel && isCurr) {
      const p = 0.45 + 0.55*Math.sin(pulseT);
      ctx.beginPath(); ctx.arc(x, y, r + 5 + p*5, 0, Math.PI*2);
      ctx.strokeStyle = col + Math.floor(p*65).toString(16).padStart(2,'0');
      ctx.lineWidth = 1.2; ctx.stroke();
    }

    if (isSel) { ctx.shadowColor = col; ctx.shadowBlur = 14; }
    else if (isCurr) { ctx.shadowColor = col; ctx.shadowBlur = 7; }

    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);

    if (isFuture && !isSel) {
      ctx.strokeStyle = 'rgba(255,255,255,0.13)'; ctx.lineWidth = 1; ctx.stroke();
    } else {
      const alpha = w < CURRENT_WEEK ? 0.35 + (i/CURRENT_WEEK)*0.6 : 1;
      ctx.globalAlpha = isSel ? 1 : alpha;
      ctx.fillStyle = col; ctx.fill(); ctx.globalAlpha = 1;
      if (isSel) {
        ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.stroke();
      }
    }
    ctx.shadowBlur = 0;
  }

  // Anchor indicator
  const selCol = triColor(selectedWeek);
  ctx.beginPath();
  ctx.moveTo(CX-5, CY+RING_R+13); ctx.lineTo(CX+5, CY+RING_R+13); ctx.lineTo(CX, CY+RING_R+6);
  ctx.closePath(); ctx.fillStyle = selCol; ctx.fill();

  drawCenter(selectedWeek);
}

// Drag
let isDragging = false, lastAngle = 0, velocity = 0, lastTime = 0;
function pAngle(e) {
  const r = canvas.getBoundingClientRect();
  return Math.atan2(
    (e.touches?e.touches[0].clientY:e.clientY) - r.top - CY,
    (e.touches?e.touches[0].clientX:e.clientX) - r.left - CX
  );
}
canvas.addEventListener('mousedown', e => { isDragging=true; velocity=0; lastAngle=pAngle(e); lastTime=Date.now(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); isDragging=true; velocity=0; lastAngle=pAngle(e); lastTime=Date.now(); }, {passive:false});
function onMove(e) {
  if (!isDragging) return; if (e.cancelable) e.preventDefault();
  const a = pAngle(e); let d = a - lastAngle;
  if (d>Math.PI) d-=2*Math.PI; if (d<-Math.PI) d+=2*Math.PI;
  rotation += d;
  const now = Date.now(); velocity = d/Math.max(1,now-lastTime)*16;
  lastTime=now; lastAngle=a; snapSel(); draw();
}
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('mouseup', ()=>{ isDragging=false; });
canvas.addEventListener('touchend', ()=>{ isDragging=false; });
canvas.addEventListener('mouseleave', ()=>{ isDragging=false; });
canvas.addEventListener('click', e => {
  if (Math.abs(velocity)>0.015) return;
  const r = canvas.getBoundingClientRect();
  const tx=e.clientX-r.left, ty=e.clientY-r.top;
  let best=null, bestD=999;
  for (let i=0;i<TOTAL;i++) {
    const a=wAngle(i), ox=CX+RING_R*Math.cos(a), oy=CY+RING_R*Math.sin(a);
    const d=Math.hypot(tx-ox,ty-oy);
    if (d<22&&d<bestD){bestD=d;best=i;}
  }
  if (best!==null) snapToWeek(best+1);
});

function snapSel() {
  let best=0, bestD=999;
  for (let i=0;i<TOTAL;i++) {
    const a=wAngle(i); let d=((a-ANCHOR+Math.PI)%(2*Math.PI))-Math.PI;
    if (Math.abs(d)<bestD){bestD=Math.abs(d);best=i;}
  }
  if (selectedWeek!==best+1){selectedWeek=best+1; updateStrip(selectedWeek);}
}

function snapToWeek(w) {
  selectedWeek=w;
  const base=((w-1)/TOTAL)*2*Math.PI-Math.PI/2;
  let diff=(ANCHOR-base)-rotation;
  while(diff>Math.PI)diff-=2*Math.PI; while(diff<-Math.PI)diff+=2*Math.PI;
  const start=rotation, t0=performance.now();
  function anim(t) {
    const p=Math.min(1,(t-t0)/380), ease=1-Math.pow(1-p,3);
    rotation=start+diff*ease; draw();
    if(p<1)requestAnimationFrame(anim); else{velocity=0;updateStrip(w);}
  }
  requestAnimationFrame(anim);
}

function loop() {
  pulseT+=0.04;
  if (!isDragging&&Math.abs(velocity)>0.0005){rotation+=velocity;velocity*=0.93;snapSel();}
  draw(); requestAnimationFrame(loop);
}

updateStrip(CURRENT_WEEK);
draw();
loop();
</script>
</body>
</html>
