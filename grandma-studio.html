<title>grandma.app — redesign</title>
<script>
  (function(){
    var t = localStorage.getItem('grandma-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    var m = localStorage.getItem('grandma-mode') || 'preg';
    document.documentElement.setAttribute('data-mode', m);
  })();
</script>
<style>
/* grandma.app — Redesign Tokens
   Neo-pastel sticker-collage aesthetic on cream.
   Light is default; dark is a toggle.
*/

/* ---- Fonts ---- */
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700;1,9..144,800;1,9..144,900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

:root {
  /* canvas */
  --bg: #F3ECD9;             /* cream */
  --bg-deep: #EFE5CC;
  --paper: #FFFEF8;          /* card paper */
  --paper-2: #F7F0DF;
  --ink: #141313;            /* near-black text */
  --ink-2: #3A3533;
  --ink-3: #6E6763;
  --ink-4: #A69E93;
  --line: rgba(20,19,19,0.08);
  --line-2: rgba(20,19,19,0.14);

  /* mode colors — softer pastels */
  --mode-pre: #E58BB4;       /* pre-pregnancy — rose */
  --mode-pre-soft: #F7CFDD;
  --mode-preg: #B7A6E8;      /* pregnancy — lavender */
  --mode-preg-soft: #E0D5F3;
  --mode-kids: #8BB8E8;      /* kids — powder blue */
  --mode-kids-soft: #D4E3F3;

  /* sticker palette (always available, used as accents) */
  --st-yellow: #F5D652;
  --st-yellow-soft: #FBEA9E;
  --st-blue: #9DC3E8;
  --st-blue-soft: #CFE0F0;
  --st-pink: #F2B2C7;
  --st-pink-soft: #F9D8E2;
  --st-green: #BDD48C;
  --st-green-soft: #DDE7BB;
  --st-lilac: #C8B6E8;
  --st-lilac-soft: #E3D8F2;
  --st-peach: #F5B896;
  --st-peach-soft: #F9D6C0;
  --st-coral: #EE7B6D;
  --st-charcoal: #2A2624;

  /* current active mode default */
  --accent: var(--mode-preg);
  --accent-soft: var(--mode-preg-soft);

  /* type */
  --font-display: 'Fraunces', 'Instrument Serif', Georgia, serif;
  --font-body: 'DM Sans', system-ui, -apple-system, sans-serif;
  --font-italic: 'Instrument Serif', 'Fraunces', serif;

  /* radii */
  --r-sm: 12px;
  --r-md: 20px;
  --r-lg: 28px;
  --r-xl: 36px;
  --r-xxl: 48px;
  --r-pill: 999px;

  /* spacing */
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px; --s-10: 40px;

  /* shadows */
  --sh-card: 0 1px 0 rgba(20,19,19,0.04), 0 8px 24px -12px rgba(20,19,19,0.12);
  --sh-pop: 0 2px 0 rgba(20,19,19,0.08), 0 18px 36px -16px rgba(20,19,19,0.22);
}

[data-theme="dark"] {
  --bg: #1A1713;
  --bg-deep: #13110E;
  --paper: #232019;
  --paper-2: #2C2820;
  --ink: #F5EDDC;
  --ink-2: #D6CCB5;
  --ink-3: #9E9684;
  --ink-4: #6E6757;
  --line: rgba(245,237,220,0.08);
  --line-2: rgba(245,237,220,0.14);

  /* mode colors stay warm but slightly brighter in dark */
  --mode-pre: #EFA2C2;
  --mode-pre-soft: #3A2730;
  --mode-preg: #C4B5EF;
  --mode-preg-soft: #2D2842;
  --mode-kids: #A5C9F0;
  --mode-kids-soft: #1F2A3A;

  --st-yellow: #F0CE4C;
  --st-yellow-soft: #3A3116;
  --st-blue: #A5C8EC;
  --st-blue-soft: #1C2A3A;
  --st-pink: #F5BBCF;
  --st-pink-soft: #36222A;
  --st-green: #C5DA98;
  --st-green-soft: #283016;
  --st-lilac: #D0BFEC;
  --st-lilac-soft: #2A2340;
  --st-peach: #F7C09D;
  --st-peach-soft: #3A2618;
  --st-coral: #F29082;
  --st-charcoal: #F5EDDC;

  --sh-card: 0 1px 0 rgba(0,0,0,0.4), 0 8px 24px -12px rgba(0,0,0,0.6);
  --sh-pop: 0 2px 0 rgba(0,0,0,0.5), 0 18px 36px -16px rgba(0,0,0,0.7);
}

/* ---- Mode classes set accent ---- */
[data-mode="pre"]  { --accent: var(--mode-pre);  --accent-soft: var(--mode-pre-soft); }
[data-mode="preg"] { --accent: var(--mode-preg); --accent-soft: var(--mode-preg-soft); }
[data-mode="kids"] { --accent: var(--mode-kids); --accent-soft: var(--mode-kids-soft); }

/* ---- Base ---- */
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-feature-settings: "ss01", "ss02";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  margin: 0;
}

* { box-sizing: border-box; }

.display {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.02;
}
.display-italic {
  font-family: var(--font-italic);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.0;
}

.mono-caps {
  font-family: var(--font-body);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 10px;
}

/* Scrollbars */
.scroll-invisible::-webkit-scrollbar { width: 0; height: 0; }
.scroll-invisible { scrollbar-width: none; }

/* ----- Stickers as SVG-friendly classes ----- */
.sticker-shadow { filter: drop-shadow(0 2px 0 rgba(20,19,19,0.06)) drop-shadow(0 6px 10px rgba(20,19,19,0.08)); }

/* Hand-drawn underline */
.scribble-underline {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 10' preserveAspectRatio='none'><path d='M2 6 Q 30 2 60 5 T 118 4' stroke='%23141313' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat;
  background-position: 0 100%;
  background-size: 100% 8px;
  padding-bottom: 6px;
}

</style>
<style>
  .app-shell { padding: 48px 56px 120px; }
  .section-title {
    font-family: var(--font-display); font-weight: 600;
    font-size: 40px; letter-spacing: -0.02em;
    margin: 36px 0 6px;
  }
  .section-title em { font-family: var(--font-italic); font-style: italic; font-weight: 400; color: var(--accent); }
  .section-sub { color: var(--ink-3); margin: 0 0 22px; font-size: 15px; max-width: 680px; }

  .phone-caption .k em { font-family: var(--font-italic); font-style: italic; font-weight: 400; color: var(--accent); }
  .phone-caption .sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.1em; }

  .tabs {
    display: flex; gap: 4px; background: var(--paper); border-radius: 999px;
    padding: 6px; border: 1px solid var(--line); width: fit-content;
    margin: 0 0 20px;
  }
  .tabs button { background: transparent; border: none; padding: 10px 18px; border-radius: 999px; font-size: 14px; color: var(--ink-3); cursor: pointer; font-family: var(--font-body); }
  .tabs button.active { background: var(--ink); color: var(--bg); font-weight: 500; }

  .hero {
    padding: 72px 56px 40px;
    position: relative; overflow: hidden;
  }
  .hero h1 { font-family: var(--font-display); font-size: 108px; line-height: 0.95; font-weight: 600; margin: 0; letter-spacing: -0.04em; }
  .hero h1 em { font-family: var(--font-italic); font-style: italic; font-weight: 400; color: var(--accent); }
  .hero p { font-size: 18px; color: var(--ink-2); max-width: 640px; margin: 22px 0 0; line-height: 1.4; }

  .tweak-panel {
    position: fixed; right: 24px; bottom: 24px; z-index: 100;
    background: var(--paper); border: 1px solid var(--line-2); border-radius: 26px;
    padding: 16px; width: 300px;
    box-shadow: var(--sh-pop);
    font-family: var(--font-body);
  }
  .tweak-panel h4 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin: 0 0 12px; }
  .tweak-row { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
  .tweak-row label { width: 80px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); }
  .tweak-row .opts { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
  .tweak-row .opt { padding: 6px 10px; border-radius: 999px; background: var(--bg-deep); border: 1px solid var(--line); font-size: 11px; cursor: pointer; color: var(--ink-2); }
  .tweak-row .opt.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .proto-stage {
    background: var(--bg-deep); border: 1px solid var(--line);
    border-radius: 36px; padding: 32px; display: grid; grid-template-columns: 280px 1fr; gap: 28px;
    min-height: 920px;
  }
  .proto-nav h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0 0 12px; }
  .proto-nav .item { padding: 10px 14px; border-radius: 14px; cursor: pointer; font-size: 14px; color: var(--ink-2); }
  .proto-nav .item.active { background: var(--ink); color: var(--bg); font-weight: 500; }
  .proto-nav .group { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-4); margin: 14px 0 6px; }

  /* Swatches */
  .swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { width: 90px; height: 120px; border-radius: 18px; border: 1px solid var(--line); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .swatch .name { font-size: 10px; color: rgba(20,19,19,0.7); text-transform: uppercase; letter-spacing: 0.1em; }
  .swatch .hex { font-family: ui-monospace, monospace; font-size: 11px; color: rgba(20,19,19,0.55); margin-top: 2px; }

  /* Type sample */
  .type-row { padding: 18px 0; border-bottom: 1px solid var(--line); }
  .type-row .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); margin-bottom: 6px; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-from="src/stickers.jsx">
// Stickers — playful SVG shapes used as accents, card backgrounds, headers
// All use currentColor so they theme easily.

const Stickers = {
  // 1. Sunburst / star burst (like the "test" and "Festival" shapes)
  Burst: ({ size = 80, fill = '#9DC3E8', stroke = '#141313', points = 12, wobble = 0.22 }) => {
    const cx = size / 2, cy = size / 2;
    const r1 = size * 0.48;
    const r2 = size * (0.48 - wobble);
    const pts = [];
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? r1 : r2;
      const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
      pts.push(`${cx + Math.cos(a) * r},${cy + Math.sin(a) * r}`);
    }
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <polygon points={pts.join(' ')} fill={fill} stroke={stroke} strokeWidth="1.5" strokeLinejoin="round" />
      </svg>
    );
  },

  // 2. Organic blob / squircle cloud
  Blob: ({ size = 80, fill = '#F5D652', variant = 0 }) => {
    const paths = [
      'M40,5 C62,5 78,20 78,42 C78,64 62,78 42,78 C18,78 5,60 5,40 C5,18 22,5 40,5 Z',
      'M50,8 C72,12 80,30 75,52 C70,74 48,80 28,72 C8,64 2,40 12,22 C22,4 34,4 50,8 Z',
      'M42,6 C66,4 82,22 78,48 C76,68 58,80 36,74 C16,68 4,48 10,28 C14,14 26,8 42,6 Z',
    ];
    return (
      <svg width={size} height={size} viewBox="0 0 84 84">
        <path d={paths[variant % paths.length]} fill={fill} stroke="#141313" strokeWidth="1.5" />
      </svg>
    );
  },

  // 3. Heart
  Heart: ({ size = 80, fill = '#F2B2C7', stroke = '#141313' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path d="M50,88 C20,68 8,50 8,32 C8,18 20,10 32,10 C40,10 46,14 50,22 C54,14 60,10 68,10 C80,10 92,18 92,32 C92,50 80,68 50,88 Z" fill={fill} stroke={stroke} strokeWidth="1.5" />
    </svg>
  ),

  // 4. Cross/plus (health motif)
  Cross: ({ size = 80, fill = '#F5D652' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path d="M38,10 h24 a6,6 0 0 1 6,6 v22 h22 a6,6 0 0 1 6,6 v12 a6,6 0 0 1 -6,6 h-22 v22 a6,6 0 0 1 -6,6 h-24 a6,6 0 0 1 -6,-6 v-22 h-22 a6,6 0 0 1 -6,-6 v-12 a6,6 0 0 1 6,-6 h22 v-22 a6,6 0 0 1 6,-6 z" fill={fill} stroke="#141313" strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  ),

  // 5. Squiggle / wobble rectangle (like the "Opera" card)
  Squishy: ({ w = 120, h = 80, fill = '#F5D652', rot = 0 }) => (
    <svg width={w} height={h} viewBox="0 0 120 80" style={{ transform: `rotate(${rot}deg)` }}>
      <path d="M10,14 Q60,4 110,12 Q118,40 112,68 Q60,78 8,66 Q2,40 10,14 Z" fill={fill} stroke="#141313" strokeWidth="1.5" />
    </svg>
  ),

  // 6. Dashed circle (outline, for onboarding dots etc.)
  CircleDashed: ({ size = 40, stroke = '#141313' }) => (
    <svg width={size} height={size} viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke={stroke} strokeWidth="1.3" strokeDasharray="2 2.5" />
    </svg>
  ),

  // 7. Flower
  Flower: ({ size = 80, petal = '#F2B2C7', center = '#F5D652' }) => {
    const petals = [];
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * 360;
      petals.push(<ellipse key={i} cx="50" cy="22" rx="12" ry="18" fill={petal} stroke="#141313" strokeWidth="1.3" transform={`rotate(${a} 50 50)`} />);
    }
    return (
      <svg width={size} height={size} viewBox="0 0 100 100">
        {petals}
        <circle cx="50" cy="50" r="10" fill={center} stroke="#141313" strokeWidth="1.3" />
      </svg>
    );
  },

  // 8. Abstract squiggle (wavy line)
  Squiggle: ({ w = 120, h = 24, stroke = '#141313' }) => (
    <svg width={w} height={h} viewBox="0 0 120 24" preserveAspectRatio="none">
      <path d="M2,12 Q12,2 22,12 T42,12 T62,12 T82,12 T102,12 T118,12" fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" />
    </svg>
  ),

  // 9. Star (five-point)
  Star: ({ size = 60, fill = '#F5D652' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path d="M50,8 L61,38 L94,40 L68,60 L78,92 L50,72 L22,92 L32,60 L6,40 L39,38 Z" fill={fill} stroke="#141313" strokeWidth="1.5" strokeLinejoin="round" />
    </svg>
  ),

  // 10. Droplet
  Drop: ({ size = 60, fill = '#9DC3E8' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path d="M50,8 C50,8 22,42 22,62 C22,80 36,94 50,94 C64,94 78,80 78,62 C78,42 50,8 50,8 Z" fill={fill} stroke="#141313" strokeWidth="1.5" />
    </svg>
  ),

  // 11. Moon
  Moon: ({ size = 60, fill = '#C8B6E8' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path d="M68,14 C46,14 30,32 30,54 C30,74 46,88 66,88 C74,88 82,84 86,78 C74,78 62,68 58,54 C54,36 60,22 68,14 Z" fill={fill} stroke="#141313" strokeWidth="1.5" />
    </svg>
  ),

  // 12. Leaf
  Leaf: ({ size = 60, fill = '#BDD48C' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path d="M12,88 C12,50 42,12 88,12 C88,58 58,88 12,88 Z" fill={fill} stroke="#141313" strokeWidth="1.5" />
      <path d="M20,82 Q50,54 84,18" stroke="#141313" strokeWidth="1.3" fill="none" />
    </svg>
  ),

  // 13. Sun with rays
  Sun: ({ size = 70, fill = '#F5D652' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="22" fill={fill} stroke="#141313" strokeWidth="1.5"/>
      {Array.from({length:8}).map((_,i)=>{const a=(i/8)*Math.PI*2;const x1=50+Math.cos(a)*30, y1=50+Math.sin(a)*30, x2=50+Math.cos(a)*44, y2=50+Math.sin(a)*44;return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#141313" strokeWidth="1.8" strokeLinecap="round"/>;})}
    </svg>
  ),

  // 14. Cloud
  Cloud: ({ size = 80, fill = '#C8D4E8' }) => (
    <svg width={size} height={(size * 0.65)} viewBox="0 0 120 80">
      <path d="M20,60 C8,60 8,42 22,40 C22,22 48,18 52,36 C60,22 88,24 88,42 C104,42 106,60 92,62 Z" fill={fill} stroke="#141313" strokeWidth="1.5"/>
    </svg>
  ),

  // 15. Rainbow
  Rainbow: ({ size = 80 }) => (
    <svg width={size} height={size*0.6} viewBox="0 0 100 60">
      <path d="M8,58 A42,42 0 0 1 92,58" fill="none" stroke="#EE4A3C" strokeWidth="6"/>
      <path d="M14,58 A36,36 0 0 1 86,58" fill="none" stroke="#F5D652" strokeWidth="6"/>
      <path d="M20,58 A30,30 0 0 1 80,58" fill="none" stroke="#BDD48C" strokeWidth="6"/>
      <path d="M26,58 A24,24 0 0 1 74,58" fill="none" stroke="#9DC3E8" strokeWidth="6"/>
      <path d="M32,58 A18,18 0 0 1 68,58" fill="none" stroke="#C8B6E8" strokeWidth="6"/>
    </svg>
  ),

  // 16. Lightning bolt
  Bolt: ({ size = 60, fill = '#F5D652' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path d="M54,8 L22,54 L44,54 L38,92 L78,38 L54,38 Z" fill={fill} stroke="#141313" strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  ),

  // 17. Footprint (little foot)
  Foot: ({ size = 60, fill = '#F2B2C7' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path d="M30,80 C20,70 20,48 34,40 C48,32 60,44 58,62 C56,78 44,90 30,80 Z" fill={fill} stroke="#141313" strokeWidth="1.5"/>
      <circle cx="52" cy="28" r="6" fill={fill} stroke="#141313" strokeWidth="1.3"/>
      <circle cx="66" cy="24" r="5" fill={fill} stroke="#141313" strokeWidth="1.3"/>
      <circle cx="78" cy="30" r="4.5" fill={fill} stroke="#141313" strokeWidth="1.3"/>
      <circle cx="85" cy="42" r="4" fill={fill} stroke="#141313" strokeWidth="1.3"/>
    </svg>
  ),

  // 18. Pacifier
  Pacifier: ({ size = 70, fill = '#F2B2C7' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="54" r="24" fill={fill} stroke="#141313" strokeWidth="1.5"/>
      <ellipse cx="50" cy="28" rx="10" ry="8" fill="#F5D652" stroke="#141313" strokeWidth="1.5"/>
      <circle cx="50" cy="54" r="10" fill="#F5EDDC" stroke="#141313" strokeWidth="1.3"/>
    </svg>
  ),

  // 19. Bottle
  Bottle: ({ size = 70, fill = '#9DC3E8' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <rect x="34" y="28" width="32" height="56" rx="10" fill={fill} stroke="#141313" strokeWidth="1.5"/>
      <rect x="38" y="14" width="24" height="16" rx="4" fill="#F5D652" stroke="#141313" strokeWidth="1.5"/>
      <line x1="38" y1="48" x2="62" y2="48" stroke="#141313" strokeWidth="1.2" strokeDasharray="2 3"/>
      <line x1="38" y1="60" x2="62" y2="60" stroke="#141313" strokeWidth="1.2" strokeDasharray="2 3"/>
    </svg>
  ),

  // 20. Onesie
  Onesie: ({ size = 80, fill = '#C8B6E8' }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">

<script type="text/babel" data-from="src/phone.jsx">
// Phone — lightweight iPhone frame styled for the cream aesthetic
// Replaces the heavier iOS starter for this prototype.

const { Icon, Stickers } = window;

function Phone({ children, bg, dark, w = 390, h = 844, noBezel = false, style = {} }) {
  const frame = dark ? '#1A1713' : '#2A2624';
  return (
    <div style={{
      width: w + 14, height: h + 14, borderRadius: 52,
      background: frame,
      padding: 7,
      boxShadow: '0 30px 80px -20px rgba(20,19,19,0.35), 0 0 0 2px rgba(20,19,19,0.08)',
      position: 'relative',
      ...style,
    }}>
      <div style={{
        width: w, height: h, borderRadius: 46, overflow: 'hidden',
        background: bg || 'var(--bg)',
        position: 'relative',
      }}>
        {/* dynamic island */}
        <div style={{
          position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
          width: 120, height: 34, borderRadius: 20, background: '#000', zIndex: 50,
        }} />
        {/* status bar */}
        <PhoneStatusBar dark={dark} />
        {/* content */}
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}>
          {children}
        </div>
        {/* home indicator */}
        <div style={{
          position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
          width: 130, height: 5, borderRadius: 100,
          background: dark ? 'rgba(245,237,220,0.55)' : 'rgba(20,19,19,0.3)',
          zIndex: 60,
        }} />
      </div>
    </div>
  );
}

function PhoneStatusBar({ dark }) {
  const c = dark ? '#F5EDDC' : '#141313';
  return (
    <div style={{
      position: 'absolute', top: 0, left: 0, right: 0, height: 54,
      padding: '17px 30px 0', display: 'flex', justifyContent: 'space-between',
      alignItems: 'center', zIndex: 20,
      fontFamily: '-apple-system, "SF Pro", system-ui',
    }}>
      <span style={{ fontSize: 16, fontWeight: 600, color: c, letterSpacing: -0.3 }}>9:41</span>
      <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
        <svg width="18" height="11" viewBox="0 0 18 11"><rect x="0" y="7" width="3" height="4" rx="0.5" fill={c}/><rect x="5" y="5" width="3" height="6" rx="0.5" fill={c}/><rect x="10" y="2" width="3" height="9" rx="0.5" fill={c}/><rect x="15" y="0" width="3" height="11" rx="0.5" fill={c}/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11"><path d="M8 3c2 0 4 1 5 2l1-1C12 2 10 1 8 1S4 2 2 4l1 1c1-1 3-2 5-2z" fill={c}/><path d="M8 6c1 0 2 .5 3 1l1-1c-1-1-3-1-4-1s-3 0-4 1l1 1c1-.5 2-1 3-1z" fill={c}/><circle cx="8" cy="9" r="1.2" fill={c}/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke={c} strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="18" height="8" rx="2" fill={c}/><path d="M23 4v4c.8-.3 1.3-1 1.3-2s-.5-1.7-1.3-2z" fill={c} fillOpacity="0.5"/></svg>
      </div>
    </div>
  );
}

// Context so any TabBar deep in a screen can route central-menu picks without prop-drilling.
const PhoneCtx = React.createContext({ onMenuPick: null, setActive: null });

// Top nav row for in-content screens (not using iOS large title)
function TopBar({ left, center, right, dark }) {
  return (
    <div style={{
      padding: '62px 20px 8px', display: 'flex', alignItems: 'center',
      justifyContent: 'space-between', gap: 12,
    }}>
      <div>{left}</div>
      <div style={{ flex: 1, textAlign: 'center', fontSize: 15, fontWeight: 500, color: 'var(--ink-2)', letterSpacing: -0.2 }}>{center}</div>
      <div>{right}</div>
    </div>
  );
}

function CircleBtn({ children, size = 42, filled, dark, style = {}, onClick }) {
  return (
    <button onClick={onClick} style={{
      width: size, height: size, borderRadius: 999,
      background: filled ? 'var(--ink)' : 'var(--paper)',
      color: filled ? 'var(--paper)' : 'var(--ink)',
      border: filled ? 'none' : '1px dashed rgba(20,19,19,0.25)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      cursor: 'pointer', padding: 0,
      ...style,
    }}>{children}</button>
  );
}

// Tab bar (bottom) — matches the real app: Home / Calendar / [center log btn] / Analytics / Profile, with labels.
// The center button opens an expandable Log Activity menu (grid of 8 log types + Manage Routines).
function TabBar({ active = 0, onSelect, dark, mode, logOpen, onLogToggle, onMenuPick }) {
  const ctx = React.useContext(PhoneCtx);
  const effMenuPick = onMenuPick || (ctx && ctx.onMenuPick);
  const [localOpen, setLocalOpen] = React.useState(false);
  const open = logOpen != null ? logOpen : localOpen;
  const setOpen = onLogToggle || setLocalOpen;

  const tabs = [
    { icon: 'Home', key: 'home', label: 'HOME' },
    { icon: 'Calendar', key: 'agenda', label: 'CALENDAR' },
    { center: true },
    { icon: 'BarChart', key: 'analytics', label: 'ANALYTICS' },
    { icon: 'User', key: 'profile', label: 'PROFILE' },
  ];

  return (
    <>
      {/* Expandable log menu */}
      {open && <LogMenu onClose={() => setOpen(false)} onPick={(key) => { setOpen(false); effMenuPick && effMenuPick(key); }} />}

      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0,
        paddingBottom: 28, paddingTop: 10,
        background: dark ? 'rgba(26,23,19,0.96)' : 'rgba(20,19,19,0.96)',
        backdropFilter: 'blur(20px)',
        borderTopLeftRadius: 32, borderTopRightRadius: 32,
        display: 'flex', justifyContent: 'space-around', alignItems: 'flex-start',
        zIndex: 40,
      }}>
        {tabs.map((t, i) => {
          if (t.center) {
            return (
              <button key={i} onClick={() => setOpen(!open)} style={{
                width: 56, height: 56, borderRadius: 999,
                background: 'var(--accent)', border: 'none',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: '#fff', cursor: 'pointer', padding: 0, marginTop: -4,
                boxShadow: '0 8px 22px -6px color-mix(in srgb, var(--accent) 60%, transparent)',
                transform: open ? 'rotate(45deg)' : 'rotate(0deg)', transition: 'transform .25s ease',
              }}>
                {open ? <Icon.Close size={22}/> : (Icon.Sparkle ? <Icon.Sparkle size={22}/> : <Icon.Plus size={22}/>)}
              </button>
            );
          }
          const IconCmp = Icon[t.icon] || Icon.Home;
          const isActive = active === i;
          return (
            <button key={i} onClick={() => onSelect && onSelect(i)} style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              color: isActive ? 'var(--accent)' : 'rgba(245,237,220,0.55)',
              padding: '4px 8px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              fontFamily: 'var(--font-body)', fontSize: 9, fontWeight: 600, letterSpacing: '0.1em',
            }}>
              <IconCmp size={22} />
              <span>{t.label}</span>
            </button>
          );
        })}
      </div>
    </>
  );
}

// The expandable quick-nav menu — radial arc of pill buttons fanning up from the center.
// Items match the simulator: Insights, Daily Rewards, Garage, Grandma Talk, Channels.
function LogMenu({ onClose, onPick }) {
  const items = [
    { key: 'insights',  label: 'Insights',       color: '#F5B14A', icon: (Icon.Sparkle || Icon.Plus) },
    { key: 'rewards',   label: 'Daily\nRewards',  color: '#F5CF4A', icon: (Icon.Trophy || Icon.Heart) },
    { key: 'garage',    label: 'Garage',         color: '#7CC8F0', icon: (Icon.Tag || Icon.Grid) },
    { key: 'talk',      label: 'Grandma\nTalk',   color: '#B08CFF', icon: (Icon.Chat || Icon.Heart) },
    { key: 'channels',  label: 'Channels',       color: '#7CC8F0', icon: Icon.User },
  ];
  // Positions along an arc above the center button (center ~ bottom 54)
  const arc = [
    { x: -120, y: -30 }, // Insights (top-left)
    { x: -70,  y: -85 }, // Rewards (upper-left)
    { x: 0,    y: -105 },// Garage (top)
    { x: -90,  y: -90 }, // -- skip, recompute below
    { x: 90,   y: -30 }, // Channels (right)
  ];
  // Cleaner: compute arc from angle for 5 items spanning 160deg
  const positions = items.map((_, i) => {
    const startA = 200; // degrees (bottom-left-ish)
    const endA = 340;
    const a = (startA + ((endA - startA) * i) / (items.length - 1)) * Math.PI / 180;
    const r = 110;
    return { x: Math.cos(a) * r, y: Math.sin(a) * r };
  });
  return (
    <>
      {/* scrim */}
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0,
        background: 'rgba(10,8,6,0.55)', backdropFilter: 'blur(3px)', zIndex: 38,
      }}/>
      {/* arc of buttons, anchored above the center tab button */}
      <div style={{
        position: 'absolute', left: '50%', bottom: 74, transform: 'translateX(-50%)',
        width: 0, height: 0, zIndex: 41,
      }}>
        {items.map((it, i) => {
          const { x, y } = positions[i];
          const Ic = it.icon;
          return (
            <button key={it.key} onClick={() => (onPick ? onPick(it.key) : onClose && onClose())} style={{
              position: 'absolute', left: x - 32, top: y - 32,
              width: 64, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
              background: 'transparent', border: 'none', cursor: 'pointer',
              animation: `logPop .35s cubic-bezier(.25,1.4,.4,1) ${i * 0.04}s backwards`,
            }}>
              <div style={{
                width: 52, height: 52, borderRadius: 999,
                background: `color-mix(in srgb, ${it.color} 22%, #1a1713)`,
                border: `1.5px solid ${it.color}`,
                display: 'grid', placeItems: 'center', color: it.color,
                boxShadow: `0 6px 18px -6px ${it.color}`,
              }}><Ic size={20}/></div>
              <div style={{
                fontSize: 11, fontWeight: 600, color: '#fff', textAlign: 'center',
                lineHeight: 1.15, whiteSpace: 'pre-line',
              }}>{it.label}</div>
            </button>
          );
        })}
      </div>
      <style>{`@keyframes logPop { from { opacity: 0; transform: translate(0, 20px) scale(.4); } to { opacity: 1; transform: translate(0,0) scale(1); } }`}</style>
    </>
  );
}

Object.assign(window, { Phone, PhoneStatusBar, TopBar, CircleBtn, TabBar, PhoneCtx });

</script>

// GrandmaLogo — canonical brand mark (the watchful, loving eye)
// Sunshine almond, heart iris. The heart is always the iris — grandma sees with love.

const LASH_PATHS = [
  [100,35,100,60],[70,42,78,65],[130,42,122,65],
  [48,58,62,74],[152,58,138,74],
  [100,160,100,140],[70,158,78,138],[130,158,122,138],
  [48,142,62,128],[152,142,138,128],
];

function Lashes({ outline = '#141313', stroke = 4.5 }) {
  return (
    <>
      {LASH_PATHS.map(([x1,y1,x2,y2], i) => (
        <path key={i} d={`M${x1} ${y1} L${x2} ${y2}`} stroke={outline} strokeWidth={stroke} strokeLinecap="round" fill="none"/>
      ))}

}

function Almond({ body = '#F5D652', outline = '#141313', stroke = 4.5 }) {
  return <path d="M 35 100 Q 100 55 165 100 Q 100 145 35 100 Z" fill={body} stroke={outline} strokeWidth={stroke} strokeLinejoin="round"/>;
}

function HeartIris({ fill = '#EE7B6D', shadow = '#141313', cx = 100, cy = 104 }) {
  return (
    <g transform={`translate(${cx - 100} ${cy - 104})`}>
      <path d="M100 128 C 72 106 64 86 82 76 C 92 71 100 80 100 88 C 100 80 108 71 118 76 C 136 86 128 106 100 128 Z" fill={shadow}/>
      <path d="M100 122 C 78 104 72 88 86 80 C 94 77 100 83 100 90 C 100 83 106 77 114 80 C 128 88 122 104 100 122 Z" fill={fill}/>
      <path d="M92 88 C 88 86 84 90 86 94" stroke="#FFFEF8" strokeWidth="2.5" strokeLinecap="round" fill="none" opacity="0.9"/>
    </g>
  );
}

function GrandmaLogo({
  size = 120,
  body = '#F5D652',
  outline = '#141313',
  accent = '#EE7B6D',       // heart color
  stroke = 4.5,
  animate = true,            // blink + heartbeat
  motion = 'default',        // 'default' | 'none' | 'blinkOnly' | 'pulseOnly' | 'wake' | 'wink' | 'think'
  style,
}) {
  const id = React.useId ? React.useId().replace(/:/g, '') : 'gl-' + Math.random().toString(36).slice(2, 8);
  const wantsBlink = animate && (motion === 'default' || motion === 'blinkOnly');
  const wantsPulse = animate && (motion === 'default' || motion === 'pulseOnly');

  const css = animate ? `
    ${wantsBlink ? `
      .${id}-eye { animation: ${id}-blink 3.6s infinite; transform-origin: 100px 100px; transform-box: fill-box; }
      @keyframes ${id}-blink { 0%,88%,100% { transform: scaleY(1); } 92%,96% { transform: scaleY(0.05); } }
    ` : ''}
    ${wantsPulse ? `
      .${id}-h { animation: ${id}-pulse 1.6s ease-in-out infinite; transform-origin: 100px 104px; transform-box: fill-box; }
      @keyframes ${id}-pulse { 0%,100% { transform: scale(1); } 40% { transform: scale(1.12); } 60% { transform: scale(0.96); } }
    ` : ''}
  ` : '';

  return (
    <svg viewBox="0 0 200 200" width={size} height={size} style={{ display:'block', ...style }}>
      {animate && <style>{css}</style>}
      <Lashes outline={outline} stroke={stroke}/>
      <g className={wantsBlink ? `${id}-eye` : ''}>
        <Almond body={body} outline={outline} stroke={stroke}/>
        <g className={wantsPulse ? `${id}-h` : ''}>
          <HeartIris fill={accent} shadow={outline}/>
        </g>
      </g>
    </svg>
  );
}

Object.assign(window, { GrandmaLogo });

</script>

function HealthScoreRing({ score, mode }) {
  // Arcs positioned around a ring. Each with a sticker icon.
  const size = 220, cx = size/2, cy = size/2, r = 84;
  const arcs = [
    { from: -90, to: -30, color: 'var(--st-yellow)', sticker: <Stickers.Cross size={28} fill="var(--st-yellow)"/> },
    { from: -30, to: 30, color: 'var(--st-green)', sticker: <Stickers.Leaf size={24} fill="var(--st-green)"/> },
    { from: 30, to: 90, color: 'var(--st-pink)', sticker: <Stickers.Heart size={24} fill="var(--st-pink)"/> },
    { from: 90, to: 150, color: 'var(--st-blue)', sticker: <Stickers.Drop size={24} fill="var(--st-blue)"/> },
    { from: 150, to: 210, color: 'var(--st-lilac)', sticker: <Stickers.Dna/> },
    { from: 210, to: 270, color: 'var(--st-yellow)', sticker: <Stickers.Moon size={24} fill="var(--st-yellow)"/> },
  ];
  const arcPath = (from, to) => {
    const fr = from*Math.PI/180, tr = to*Math.PI/180;
    const x1 = cx + r*Math.cos(fr), y1 = cy + r*Math.sin(fr);
    const x2 = cx + r*Math.cos(tr), y2 = cy + r*Math.sin(tr);
    const large = (to-from) > 180 ? 1 : 0;
    return `M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}`;
  };
  return (
    <div style={{ position: 'relative', width: size, height: size, margin: '0 auto' }}>
      <svg width={size} height={size}>
        {arcs.map((a, i) => (
          <path key={i} d={arcPath(a.from+4, a.to-4)} stroke={a.color} strokeWidth="22" fill="none" strokeLinecap="round"/>
        ))}
      </svg>
      {/* chip stickers overlaid at midpoint of each arc */}
      {arcs.map((a, i) => {
        const mid = (a.from + a.to) / 2 * Math.PI / 180;
        const x = cx + (r+0) * Math.cos(mid), y = cy + (r+0) * Math.sin(mid);
        return (
          <div key={i} style={{ position:'absolute', left: x-18, top: y-18, width: 36, height: 36, borderRadius: 999, background: 'var(--paper)', display: 'grid', placeItems: 'center', border: '1.5px solid var(--ink)' }}>
            {a.sticker}
          </div>
        );
      })}
      <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center' }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 64, fontWeight: 600, lineHeight: 1 }}>{score}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 4 }}>your score ⓘ</div>
        </div>
      </div>
    </div>
  );
}

function SystemRow({ sticker, color, label, score }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderTop: '1px solid var(--line)' }}>

      <div style={{ flex: 1 }}>

      <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600 }}>{score}<span style={{ fontSize: 10, color: 'var(--ink-3)', fontWeight: 400 }}> of 10</span></div>
    </div>
  );
}

// ---- Month view ----
function MonthCalendar({ selectedDay = 15, todayDay = 17 }) {
  // April 2026: starts Wednesday. 30 days.
  const cells = [];
  for (let i=0;i<3;i++) cells.push(null); // empty SUN/MON/TUE before Apr 1
  for (let d=1; d<=30; d++) cells.push(d);

  // Per-day color dots (rough frequency matching the screenshots)
  const dotsFor = (d) => {
    if (d === null) return [];
    const map = {
      1:['#5BA6FF','#F06AA5','#F59B3E'], 2:['#5BA6FF','#F06AA5','#F59B3E'], 3:['#5BA6FF','#F06AA5','#F59B3E'], 4:['#5BA6FF','#F06AA5','#F59B3E'],
      5:['#5BA6FF','#F06AA5','#F59B3E'], 6:['#5BA6FF','#F06AA5','#F59B3E'], 7:['#5BA6FF','#F06AA5','#F59B3E'],
      8:['#5BA6FF','#F06AA5','#F59B3E'], 9:['#5BA6FF','#F06AA5'], 10:['#5BA6FF','#F06AA5','#F59B3E'], 11:['#5BA6FF','#F06AA5','#F59B3E'],
      12:['#5BA6FF','#F06AA5','#F59B3E'], 13:['#5BA6FF','#F06AA5','#F59B3E'], 14:['#5BA6FF','#F06AA5','#F59B3E'],
      15:['#5BA6FF'], 17:['#F59B3E'],
    };
    return map[d] || [];
  };

  return (
    <div style={{ padding: '18px 18px 0' }}>
      {/* Month nav */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 6px 10px' }}>
        <CircleBtn size={32} style={{ background: 'transparent' }}><Icon.Back size={16}/></CircleBtn>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600 }}>April 2026</div>
        <CircleBtn size={32} style={{ background: 'transparent' }}><Icon.ChevRight size={16}/></CircleBtn>
      </div>
      {/* Weekday header */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', textAlign: 'center', padding: '0 2px 6px', color: 'var(--ink-3)', fontSize: 10, letterSpacing: '0.15em' }}>
        {['SUN','MON','TUE','WED','THU','FRI','SAT'].map(d => <div key={d}>{d}</div>)}
      </div>
      {/* Grid */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 6 }}>
        {cells.map((d, i) => {
          const dots = dotsFor(d);
          const isFuture = d && d > todayDay+1;
          const isSel = d === selectedDay;
          const isToday = d === todayDay;
          return (
            <div key={i} style={{
              aspectRatio: '1 / 1', borderRadius: 14,
              background: isSel ? 'rgba(176,140,255,0.12)' : isToday ? 'rgba(245,155,62,0.10)' : 'rgba(255,255,255,0.03)',
              border: isSel ? '1.5px solid var(--accent)' : isToday ? '1px solid rgba(245,155,62,0.4)' : '1px solid rgba(255,255,255,0.04)',
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3,
              color: d ? (isFuture ? 'var(--ink-4)' : isToday ? '#F59B3E' : 'var(--ink)') : 'transparent',
              fontSize: 14, fontWeight: isSel || isToday ? 600 : 400,
            }}>
              {d ?? '·'}
              {dots.length > 0 && (
                <div style={{ display: 'flex', gap: 2 }}>
                  {dots.map((c,j) => <span key={j} style={{ width: 4, height: 4, borderRadius: 999, background: c }}/>)}

              )}
            </div>
          );
        })}

    </div>

    { kid: 'rio',   cat: 'feeding', hour: 8,    label: 'Breakfast',    time: '8:00 AM', pending: true, lane: 0 },

  return (
    <div style={{ margin: '14px 18px 0', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 22, padding: '14px 0 18px', position: 'relative' }}>

        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 17, fontWeight: 600 }}>Wednesday, Apr 15</div>
          <div style={{ fontSize: 11, color: 'var(--ink-3)', marginTop: 1 }}>31 pending</div>
        </div>
        <CircleBtn size={28} style={{ background: 'transparent' }}><Icon.ChevRight size={14}/></CircleBtn>
      </div>
      {/* zoom controls */}
      <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end', padding: '0 14px 4px' }}>
        <CircleBtn size={28} style={{ background: 'rgba(255,255,255,0.06)' }}><Icon.Plus size={12}/></CircleBtn>
        <CircleBtn size={28} style={{ background: 'rgba(255,255,255,0.06)' }}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M5 12h14"/></svg></CircleBtn>
      </div>
      {/* Timeline */}
      <div style={{ position: 'relative', paddingTop: 6 }}>
        {Array.from({ length: 10 }).map((_, h) => {
          const hour = h; // 12 AM -> 9 AM
          const label = hour === 0 ? '12 AM' : hour < 12 ? `${hour} AM` : hour === 12 ? '12 PM' : `${hour-12} PM`;
          return (
            <div key={h} style={{ position: 'relative', height: 56, display: 'flex', alignItems: 'flex-start' }}>
              <div style={{ width: 52, fontSize: 11, color: 'var(--ink-3)', paddingLeft: 14, paddingTop: 0 }}>{label}</div>
              <div style={{ flex: 1, borderTop: '1px solid rgba(255,255,255,0.06)', marginRight: 14, position: 'relative' }}/>
            </div>
          );
        })}
        {/* Absolute-positioned events */}
        <div style={{ position: 'absolute', top: 6, left: 66, right: 14, bottom: 0 }}>
          {events.map((e, i) => {
            const top = e.hour * 56;
            const height = (e.duration || 0.55) * 56 - 6;
            const c = CATS[e.cat];
            const kc = kidColor(e.kid);
            const laneCount = events.some(x => x.hour === e.hour && x.lane === 2) ? 3 : (events.some(x => x.hour === e.hour && x.lane === 1) ? 2 : 1);
            const laneWidth = `calc((100% - ${(laneCount-1)*6}px) / ${laneCount})`;
            return (
              <div key={i} style={{
                position: 'absolute', top, height,
                left: e.lane != null ? `calc(${e.lane} * (${laneWidth} + 6px))` : 0,
                width: e.lane != null ? laneWidth : '100%',
                background: c.softBg, border: `1px solid ${c.softBorder}`, borderLeft: `3px solid ${kc}`,
                borderRadius: 8, padding: '4px 7px', fontSize: 11, color: c.color, opacity: e.skipped ? 0.4 : 1,
                display: 'flex', flexDirection: 'column', justifyContent: 'flex-start', overflow: 'hidden',
              }}>
                <div style={{ fontWeight: 600, fontSize: 11, textDecoration: e.skipped ? 'line-through' : 'none' }}>{e.label}</div>
                <div style={{ fontSize: 9, color: 'var(--ink-3)', marginTop: 1, display: 'flex', alignItems: 'center', gap: 4 }}>
                  {e.time}
                  {e.pending && <span style={{ width: 9, height: 9, borderRadius: 999, background: 'rgba(245,177,74,0.2)', color: '#F5B14A', display: 'grid', placeItems: 'center', fontSize: 7 }}>!</span>}
                </div>
                <span style={{ marginTop: 'auto', alignSelf: 'flex-start', background: `color-mix(in srgb, ${kc} 25%, transparent)`, color: kc, fontSize: 8, padding: '1px 5px', borderRadius: 999 }}>
                  {KIDS.find(k => k.key === e.kid).name}
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// Kids Analytics — radar/hexagon thriving score + breakdown + detail sheets
const { Stickers, Icon, TopBar, CircleBtn, TabBar, PhoneStatusBar } = window;

// Radar / hexagon plot
function ThrivingRadar({ scores }) {
  // scores: { nutrition, sleep, mood, health, growth, activity }
  const cx = 150, cy = 150, r = 100;
  const axes = [
    { key: 'nutrition', label: 'Nutrition', color: 'var(--st-green)', icon: '🍴' },
    { key: 'sleep',     label: 'Sleep',     color: 'var(--st-lilac)', icon: '🌙' },
    { key: 'mood',      label: 'Mood',      color: 'var(--st-pink)',  icon: '☺' },
    { key: 'health',    label: 'Health',    color: 'var(--st-blue)',  icon: '♡' },
    { key: 'growth',    label: 'Growth',    color: 'var(--st-yellow)',icon: '↗' },
    { key: 'activity',  label: 'Activity',  color: 'var(--st-coral)', icon: '⚡' },
  ];
  const angleFor = (i) => (-Math.PI / 2) + (i * 2 * Math.PI / 6);
  const pt = (i, radius) => ({ x: cx + Math.cos(angleFor(i)) * radius, y: cy + Math.sin(angleFor(i)) * radius });
  const ringPts = (ratio) => axes.map((_, i) => {
    const p = pt(i, r * ratio);
    return `${p.x},${p.y}`;
  }).join(' ');
  const dataPts = axes.map((a, i) => {
    const v = (scores[a.key] ?? 0) / 10;
    return pt(i, r * v);
  });
  const dataPath = dataPts.map(p => `${p.x},${p.y}`).join(' ');
  const overall = Object.values(scores).reduce((a,b)=>a+b,0) / Object.values(scores).filter(v=>v>0).length;
  return (
    <div style={{ position: 'relative', width: 300, height: 300, margin: '0 auto' }}>
      <svg width="300" height="300" viewBox="0 0 300 300" style={{ overflow: 'visible' }}>
        {/* rings */}
        {[0.33, 0.66, 1].map(ratio => (
          <polygon key={ratio} points={ringPts(ratio)} fill="none" stroke="var(--line-2)" strokeWidth="1" strokeDasharray={ratio < 1 ? '2 3' : '0'} opacity={0.6}/>
        ))}
        {/* axes lines */}
        {axes.map((_, i) => {
          const p = pt(i, r);
          return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="var(--line-2)" strokeWidth="1" opacity={0.4}/>;
        })}
        {/* data shape */}
        <polygon points={dataPath} fill="var(--accent)" fillOpacity="0.18" stroke="var(--accent)" strokeWidth="1.5"/>
        {/* axis endpoints dots */}
        {axes.map((a, i) => {
          const p = pt(i, r * ((scores[a.key] ?? 0) / 10));
          return (
            <g key={a.key}>
              <circle cx={p.x} cy={p.y} r="14" fill={a.color} fillOpacity="0.18"/>
              <circle cx={p.x} cy={p.y} r="10" fill={a.color}/>
              <text x={p.x} y={p.y + 4} textAnchor="middle" fontSize="11" fill="#fff" fontWeight="700">{a.icon}</text>
            </g>
          );
        })}
      </svg>
      {/* center score */}
      <div style={{ position: 'absolute', left: 0, top: 0, width: '100%', height: '100%', display: 'grid', placeItems: 'center', pointerEvents: 'none' }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 42, fontWeight: 700, color: 'var(--st-yellow)', lineHeight: 1 }}>{overall.toFixed(1)}</div>
          <div style={{ fontSize: 11, color: 'var(--ink-3)', fontStyle: 'italic', fontFamily: 'var(--font-italic)' }}>thriving</div>
        </div>
      </div>
      {/* axis labels */}
      {axes.map((a, i) => {
        const p = pt(i, r * 1.35);
        const align = p.x < cx - 10 ? 'right' : p.x > cx + 10 ? 'left' : 'center';
        const offsetX = align === 'right' ? -60 : align === 'left' ? 0 : -30;
        return (
          <div key={a.key} style={{ position: 'absolute', left: p.x + offsetX, top: p.y - 10, width: 60, textAlign: align, fontSize: 12, fontWeight: 600, color: a.color }}>
            {a.label} <span style={{ color: 'var(--ink-3)' }}>{(scores[a.key] ?? 0).toFixed ? scores[a.key].toFixed(0) : scores[a.key] || '—'}</span>
          </div>
        );
      })}
    </div>
  );
}

      </div>
      {children}
    </div>
  );
}

function Donut({ size = 100, pct, color, label, big }) {
  const r = size / 2 - 6;
  const cf = 2 * Math.PI * r;
  return (
    <div style={{ textAlign: 'center' }}>
      <div style={{ position: 'relative', width: size, height: size }}>
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} stroke="var(--bg-deep)" strokeWidth="10" fill="none"/>
          <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth="10" fill="none" strokeDasharray={cf} strokeDashoffset={cf - (cf * pct / 100)} transform={`rotate(-90 ${size/2} ${size/2})`} strokeLinecap="round"/>
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 700, color }}>{big}</div>
        </div>
      </div>
      <div style={{ fontSize: 11, color: 'var(--ink-3)', marginTop: 6 }}>{label}</div>
    </div>
  );
}

function BarChart({ data, max, color }) {
  return (
    <div style={{ padding: '8px 4px' }}>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, height: 120, position: 'relative', paddingLeft: 18 }}>
        <div style={{ position: 'absolute', left: 0, top: 0, height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', fontSize: 9, color: 'var(--ink-3)' }}>
          <span>{max}</span><span>{(max/2).toFixed(0)}</span><span>0</span>
        </div>
        {data.map((d, i) => {
          const h = (d.v / max) * 100;
          return (
            <div key={i} style={{ flex: 1, textAlign: 'center', position: 'relative' }}>
              {d.hi && d.label && <div style={{ position: 'absolute', top: -18, left: '50%', transform: 'translateX(-50%)', fontSize: 10, background: 'var(--bg-deep)', padding: '1px 6px', borderRadius: 4, whiteSpace: 'nowrap' }}>{d.label || `${d.v}h`}</div>}
              <div style={{ height: `${Math.max(h, 2)}%`, background: d.hi ? color : `color-mix(in oklab, ${color} 60%, var(--bg-deep))`, borderRadius: 6, margin: '0 2px' }}/>
            </div>
          );
        })}
      </div>
      <div style={{ display: 'flex', gap: 4, paddingLeft: 18, marginTop: 6 }}>
        {data.map((d, i) => <div key={i} style={{ flex: 1, textAlign: 'center', fontSize: 10, color: d.hi ? color : 'var(--ink-3)', fontWeight: d.hi ? 700 : 400 }}>{d.day}</div>)}
      </div>
    </div>
  );
}

function LineChart({ data, color, max }) {
  const w = 280, h = 80, pad = 12;
  const step = (w - pad * 2) / (data.length - 1);
  const pts = data.map((v, i) => `${pad + i * step},${h - pad - ((v / max) * (h - pad * 2))}`);
  return (
    <svg width={w} height={h + 20} style={{ width: '100%' }}>
      <polyline points={pts.join(' ')} fill="none" stroke={color} strokeWidth="2"/>
      {data.map((v, i) => {
        const [x, y] = pts[i].split(',').map(Number);
        return <g key={i}>
          <circle cx={x} cy={y} r="10" fill="var(--bg-deep)" stroke="var(--line)" strokeWidth="1"/>
          <text x={x} y={y + 3} textAnchor="middle" fontSize="9" fill="var(--ink-3)">?</text>
          <text x={x} y={h + 14} textAnchor="middle" fontSize="9" fill="var(--ink-3)">{v}</text>
        </g>;
      })}
    </svg>
  );
}

function MoodPill({ emoji, label, pct, color, bg, span }) {
  return (
    <div style={{ gridColumn: span ? 'span 2' : 'auto', padding: '10px 14px', background: bg, borderRadius: 999, display: 'flex', alignItems: 'center', gap: 10, justifyContent: span ? 'center' : 'space-between' }}>

      <span style={{ color: 'var(--ink-3)', fontSize: 12 }}>{pct}</span>
    </div>
  );
}

function RecSplit({ label, pct, col, sub }) {
  return (
    <div style={{ padding: '10px 0' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ width: 22, height: 22, borderRadius: 6, background: 'var(--bg-deep)', display: 'grid', placeItems: 'center', fontSize: 11 }}>?</span>
        <div style={{ flex: 1, fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600 }}>{label}</div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: col }}>{pct}%</div>
      </div>
      <div style={{ height: 6, borderRadius: 999, background: 'var(--bg-deep)', marginTop: 6, overflow: 'hidden' }}>
        <div style={{ width: `${pct}%`, height: '100%', background: col }}/>
      </div>
      <div style={{ fontSize: 11, color: 'var(--ink-3)', marginTop: 4 }}>{sub}</div>
    </div>
  );
}

<script type="text/babel" data-from="src/central-menu-screen.jsx">
// Central Menu Screen — the radial "quick-jump" menu that pops from the tab bar's +.
// Now follows the design system: theme-aware scrim (cream in light, ink in dark),
// sticker-shaped action tiles, Fraunces italic labels. Opens with a fan (leque)
// animation: all items start stacked at the tab-bar center then sweep out into
// their final arc positions.
const { Stickers, Icon, TabBar, PhoneCtx } = window;

function CentralMenuScreen({ dark, mode, background, onClose, onPick }) {
  // Each action gets its own sticker shape + color + icon — drawn from the same
  // vocabulary as the rest of the app so this screen feels like part of the collage,
  // not a floating overlay borrowed from another app.
  const items = [
    {
      key: 'insights',  label: 'Insights',      sub: 'what grandma sees',
      sticker: ({ size }) => <Stickers.Burst size={size} fill="var(--st-yellow)" points={12}/>,
      ic: (Icon.Sparkle || Icon.Plus),
      rot: -6,
    },
    {
      key: 'rewards',   label: 'Rewards',       sub: 'little gifts',
      sticker: ({ size }) => <Stickers.Flower size={size} petal="var(--st-pink)" center="var(--st-yellow)"/>,
      ic: (Icon.Trophy || Icon.Heart),
      rot: 4,
    },
    {
      key: 'talk',      label: 'Grandma Talk',  sub: 'voice · live',
      sticker: ({ size }) => <Stickers.Blob size={size} fill="var(--st-lilac)" variant={1}/>,
      ic: (Icon.Chat || Icon.Heart),
      rot: -8,
    },
    {
      key: 'garage',    label: 'Garage',        sub: 'pass it on',
      sticker: ({ size }) => <Stickers.Squishy w={size * 1.15} h={size * 0.78} fill="var(--st-green)"/>,
      ic: (Icon.Tag || Icon.Grid),
      rot: 6,
    },
    {
      key: 'channels',  label: 'Channels',      sub: 'find your people',
      sticker: ({ size }) => <Stickers.Blob size={size} fill="var(--st-peach)" variant={2}/>,
      ic: Icon.User,
      rot: -4,
    },
  ];

  // Fan (leque) layout — items arc from lower-left to lower-right, radiating
  // upward from a virtual pivot at the tab-bar center (just above the + button).
  // We compute each final position in polar coords (r, theta) and the fan animation
  // sweeps theta from startAngle to final over a staggered delay per item.
  const N = items.length;
  const R = 172;                   // arc radius from pivot
  const START_DEG = 208;           // leftmost (roughly 8 o'clock)
  const END_DEG   = 332;           // rightmost (roughly 4 o'clock), upward = 270
  const layout = items.map((_, i) => {
    const t = N === 1 ? 0.5 : i / (N - 1);
    const deg = START_DEG + (END_DEG - START_DEG) * t;
    const rad = deg * Math.PI / 180;
    return {
      x: Math.cos(rad) * R,
      y: Math.sin(rad) * R,
      deg,
    };
  });

  const handle = (k) => { if (onPick) onPick(k); };

  // Theme-aware scrim colors — dark uses deep ink, light uses cream paper wash.
  const scrimBg = dark
    ? `radial-gradient(120% 80% at 50% 106%, rgba(26,23,19,0.35), rgba(12,10,8,0.85) 55%, rgba(6,5,4,0.94))`
    : `radial-gradient(110% 70% at 50% 106%, rgba(243,236,217,0.04), rgba(243,236,217,0.86) 45%, rgba(243,236,217,0.96) 70%)`;
  const labelBg   = dark ? 'var(--paper)' : 'var(--paper)';
  const labelBorder = dark ? '1px solid var(--line-2)' : '1px solid var(--line-2)';

  return (
    <div style={{ height: '100%', background: 'var(--bg)', position: 'relative', overflow: 'hidden' }}>
      {/* The actual background screen underneath */}
      <div style={{ position: 'absolute', inset: 0 }}>{background}</div>

      {/* Scrim — theme-aware: cream wash in light mode, ink in dark */}
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0,
        background: scrimBg,
        backdropFilter: 'blur(10px) saturate(1.05)',
        WebkitBackdropFilter: 'blur(10px) saturate(1.05)',
        cursor: 'pointer',
      }}/>

      {/* Decorative sticker confetti — sits above scrim, below tiles */}
      <div style={{ position: 'absolute', top: 76, left: 26, transform: 'rotate(-18deg)', opacity: dark ? 0.7 : 0.55, pointerEvents: 'none' }}>
        <Stickers.Star size={40} fill="var(--st-yellow)"/>
      </div>
      <div style={{ position: 'absolute', top: 120, right: 28, transform: 'rotate(14deg)', opacity: dark ? 0.75 : 0.45, pointerEvents: 'none' }}>
        <Stickers.Heart size={32} fill="var(--st-coral)"/>
      </div>
      <div style={{ position: 'absolute', top: 200, left: 36, transform: 'rotate(8deg)', opacity: dark ? 0.7 : 0.4, pointerEvents: 'none' }}>
        <Stickers.Drop size={28} fill="var(--st-blue)"/>
      </div>

      {/* Prompt — editorial serif + italic, matches hero voice */}
      <div style={{
        position: 'absolute', top: 82, left: 0, right: 0, textAlign: 'center',
        pointerEvents: 'none',
        animation: 'menuHint .45s ease-out',
      }}>
        <div style={{
          fontFamily: 'var(--font-display)', fontWeight: 500,
          fontSize: 22, letterSpacing: '-0.01em', color: 'var(--ink)',
          lineHeight: 1.1,
        }}>
          where to,{' '}
          <span style={{ fontFamily: 'var(--font-italic)', fontStyle: 'italic', fontWeight: 400, color: 'var(--accent, #EE7B6D)' }}>
            dear?
          </span>
        </div>
        <div style={{
          fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase',
          color: 'var(--ink-3)', marginTop: 6, fontFamily: 'var(--font-body)',
        }}>
          pick a corner
        </div>
      </div>

      {/* Fan pivot — sits at the tab-bar center, just above the + button.
          Items are positioned relative to this zero-size anchor. */}
      <div style={{
        position: 'absolute', left: '50%', bottom: 92,
        width: 0, height: 0, zIndex: 10,
      }}>
        {items.map((it, i) => {
          const { x, y } = layout[i];
          const Ic = it.ic;
          const STICKER_SIZE = 88;   // smaller than before
          const ICON_SIZE    = 18;   // smaller icons as requested
          // Fan animation: CSS custom props supply final offsets; keyframe interpolates
          // from stacked-at-pivot → fanned-out. Stagger per index so items sweep out
          // like a hand fan unfolding left-to-right.
          const delay = i * 0.06;
          return (
            <button
              key={it.key}
              onClick={() => handle(it.key)}
              style={{
                position: 'absolute',
                left: 0, top: 0,
                width: 120,
                display: 'flex', flexDirection: 'column', alignItems: 'center',
                background: 'transparent', border: 'none', cursor: 'pointer', padding: 0,
                // CSS vars drive the keyframe's "to" state
                '--fx': `${x}px`,
                '--fy': `${y}px`,
                '--fr': `${it.rot}deg`,
                animation: `fanOpen .58s cubic-bezier(.22,1.4,.36,1) ${delay}s backwards`,
                transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${it.rot}deg)`,
                transformOrigin: 'center',
              }}
            >
              {/* Sticker + icon stacked */}
              <div style={{
                position: 'relative', width: STICKER_SIZE, height: STICKER_SIZE,
                display: 'grid', placeItems: 'center',
                filter: dark
                  ? 'drop-shadow(0 6px 16px rgba(0,0,0,0.45))'
                  : 'drop-shadow(0 6px 12px rgba(20,19,19,0.08))',
              }}>
                <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center' }}>
                  <it.sticker size={STICKER_SIZE}/>
                </div>
                <div style={{
                  position: 'relative', width: 32, height: 32,
                  display: 'grid', placeItems: 'center',
                  color: '#141313',   // icons read on top of bright stickers → always dark ink
                }}>
                  <Ic size={ICON_SIZE}/>
                </div>
              </div>

              {/* Label pill — paper chip so it pops on either theme */}
              <div style={{
                marginTop: 6,
                background: labelBg, color: 'var(--ink)',
                border: labelBorder,
                borderRadius: 999, padding: '3px 10px',
                fontFamily: 'var(--font-body)', fontSize: 11.5, fontWeight: 500,
                whiteSpace: 'nowrap',
                transform: `rotate(${-it.rot}deg)`,
              }}>
                {it.label}
              </div>
              <div style={{
                marginTop: 3,
                fontFamily: 'var(--font-italic)', fontStyle: 'italic',
                fontSize: 10.5, color: 'var(--ink-3)',
                transform: `rotate(${-it.rot}deg)`,
                textAlign: 'center',
                maxWidth: 104,
              }}>
                {it.sub}
              </div>
            </button>
          );
        })}
      </div>

      {/* Tab bar — center button in "open" state so tapping it closes the menu */}
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 11 }}>
        <TabBar
          active={-1} dark={dark} mode={mode} logOpen={false}
          onLogToggle={() => onClose && onClose()}
          onMenuPick={handle}
        />
      </div>

      <style>{`
        /* Fan (leque) open — items start stacked at pivot (0,0) with 0deg rotation,
           scale slightly up and fan out to their final (fx, fy, fr) positions. */
        @keyframes fanOpen {
          0% {
            opacity: 0;
            transform: translate(-50%, -50%) rotate(0deg) scale(.55);
          }
          55% {
            opacity: 1;
          }
          100% {
            opacity: 1;
            transform: translate(calc(-50% + var(--fx)), calc(-50% + var(--fy))) rotate(var(--fr)) scale(1);
          }
        }
        @keyframes menuHint {
          from { opacity: 0; transform: translateY(-6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </div>
  );
}

Object.assign(window, { CentralMenuScreen });

</script>

// Radial hours-slept hero ring — multi-layer arcs
function RadialHero({ hours = 25.8, goalPct = 31 }) {
  const size = 240, cx = size/2, cy = size/2;
  const arcs = [
    { r: 98, color: 'var(--st-blue)',  pct: 0.62, label: 'sleep' },
    { r: 86, color: 'var(--st-coral)', pct: 0.38, label: 'nutrition' },
    { r: 74, color: 'var(--st-green)', pct: 0.50, label: 'activity' },
  ];
  const path = (r, pct) => {
    const C = 2 * Math.PI * r;
    const dash = C * pct;
    return { strokeDasharray: `${dash} ${C - dash}`, strokeDashoffset: C * 0.25 };
  };
  return (
    <div style={{ position: 'relative', display: 'grid', placeItems: 'center', padding: '10px 0 4px' }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {/* track rings */}
        {arcs.map((a, i) => (
          <circle key={`t${i}`} cx={cx} cy={cy} r={a.r} fill="none" stroke="var(--line)" strokeWidth="6"/>
        ))}
        {/* filled arcs */}
        {arcs.map((a, i) => {
          const s = path(a.r, a.pct);
          return (
            <circle key={`f${i}`} cx={cx} cy={cy} r={a.r} fill="none"
              stroke={a.color} strokeWidth="6" strokeLinecap="round"
              transform={`rotate(-90 ${cx} ${cy})`}
              style={s}/>
          );
        })}
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2 }}>
        <Icon.Moon size={22} style={{ color: 'var(--st-blue)' }}/>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 42, fontWeight: 700, lineHeight: 1, letterSpacing: '-0.03em' }}>{hours}</div>
        <div className="mono-caps" style={{ color: 'var(--ink-3)' }}>HOURS SLEPT</div>
        <div style={{
          marginTop: 6, padding: '4px 10px', borderRadius: 999,
          background: 'color-mix(in srgb, var(--st-coral) 25%, transparent)',
          color: 'var(--st-coral)', fontSize: 11, fontWeight: 700,
        }}>{goalPct}% of goal</div>
      </div>
    </div>
  );
}

<script type="text/babel" data-from="src/reward-stickers.jsx">
// Reward Stickers — distinct badge/sticker designs for each reward category
// in grandma.app. All follow the house style: ink-black 1.5-stroke outlines,
// neo-pastel fills drawn from the sticker palette, sticker-collage feel.
//
// Categories (from src/more-screens.jsx DailyRewards + Profile BADGES + app rewards logic):
//   1. Streak        — flame / day-counter momentum (DailyRewards "14 day streak")
//   2. Weekly        — 7-day consistency grid completion
//   3. Quest         — daily task done (+5 pts)
//   4. Milestone     — collectable day-X badges (Profile BADGES strip — "All 24")
//   5. Mode          — journey badges (Trying / Pregnant / Parent)
//   6. CareCircle    — invite / share / support rewards
//   7. Garage        — gifting / trading / passing-on rewards
//
// All support { size, fill, stroke } and render at any pixel size via viewBox.

const INK = '#141313';

const RewardStickers = {
  // ---------- 1. STREAK ----------
  // A. Flame — the canonical streak badge (matches "14 day streak" hero)
  Flame: ({ size = 80, fill = '#EE7B6D', stroke = INK }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path
        d="M50,6 C52,20 70,30 72,52 C74,78 56,92 50,92 C44,92 26,78 28,52 C30,36 40,36 38,22 C44,28 50,22 50,6 Z"
        fill={fill} stroke={stroke} strokeWidth="1.8" strokeLinejoin="round"
      />
      <path
        d="M50,42 C52,52 62,58 62,70 C62,82 54,86 50,86 C46,86 38,82 38,70 C38,60 46,58 48,50 C50,54 50,48 50,42 Z"
        fill="#F5D652" stroke={stroke} strokeWidth="1.3" strokeLinejoin="round"
      />
    </svg>
  ),

  // B. Streak counter chip — flame + number plate
  StreakChip: ({ size = 80, days = 14, fill = '#EE7B6D', stroke = INK }) => (
    <svg width={size * 1.6} height={size} viewBox="0 0 160 100">
      <rect x="4" y="18" width="152" height="66" rx="33" fill="#FFFEF8" stroke={stroke} strokeWidth="1.5"/>
      <circle cx="36" cy="51" r="26" fill={fill} stroke={stroke} strokeWidth="1.5"/>
      <path d="M36,32 C37,40 47,46 48,60 C49,74 40,80 36,80 C32,80 23,74 24,60 C25,50 31,50 30,42 C34,46 36,42 36,32 Z"
            fill="#F5D652" stroke={stroke} strokeWidth="1.2" strokeLinejoin="round"/>
      <text x="98" y="62" textAnchor="middle" fontFamily="Fraunces, serif" fontWeight="700" fontSize="30" fill={stroke}>
        {days}
      </text>
    </svg>
  ),

  // ---------- 2. WEEKLY ----------
  // A. Week wheel — 7 wedges, some filled (done), one bright (today), rest outlined
  WeekWheel: ({ size = 80, done = 5, today = 5, fill = '#BDD48C', stroke = INK }) => {
    const cx = 50, cy = 50, r = 40;
    const wedges = [];
    for (let i = 0; i < 7; i++) {
      const a1 = (i / 7) * Math.PI * 2 - Math.PI / 2;
      const a2 = ((i + 1) / 7) * Math.PI * 2 - Math.PI / 2;
      const x1 = cx + Math.cos(a1) * r, y1 = cy + Math.sin(a1) * r;
      const x2 = cx + Math.cos(a2) * r, y2 = cy + Math.sin(a2) * r;
      const d = `M${cx},${cy} L${x1},${y1} A${r},${r} 0 0 1 ${x2},${y2} Z`;
      const f = i === today - 1 ? '#F5D652' : i < done ? fill : '#FFFEF8';
      wedges.push(<path key={i} d={d} fill={f} stroke={stroke} strokeWidth="1.4"/>);
    }
    return (
      <svg width={size} height={size} viewBox="0 0 100 100">
        {wedges}
        <circle cx={cx} cy={cy} r="10" fill="#FFFEF8" stroke={stroke} strokeWidth="1.4"/>
      </svg>
    );
  },

  // B. Week grid — 7 tiles in a bar (matches THIS WEEK section)
  WeekBar: ({ size = 80, done = 3, today = 4, stroke = INK }) => {
    const tiles = [];
    for (let i = 0; i < 7; i++) {
      const x = 4 + i * 20;
      const isDone = i < done;
      const isToday = i === today - 1;
      const f = isDone ? '#BDD48C' : isToday ? INK : '#FFFEF8';
      tiles.push(<rect key={i} x={x} y="30" width="16" height="40" rx="5" fill={f} stroke={stroke} strokeWidth="1.3"/>);
      if (isDone) tiles.push(<path key={'c'+i} d={`M${x+4},${50} l3,3 l6,-6`} fill="none" stroke={INK} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>);
      if (isToday) tiles.push(<circle key={'t'+i} cx={x+8} cy="50" r="3" fill="#F5D652"/>);
    }
    return (
      <svg width={size * 1.6} height={size} viewBox="0 0 148 100">
        {tiles}
      </svg>
    );
  },

  // ---------- 3. QUEST ----------
  // A. Quest scroll — ribbon/banner with a checkmark
  QuestRibbon: ({ size = 80, fill = '#F5D652', stroke = INK }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <path
        d="M16,18 L84,18 L84,72 L72,84 L60,72 L48,84 L36,72 L24,84 L16,72 Z"
        fill={fill} stroke={stroke} strokeWidth="1.6" strokeLinejoin="round"
      />
      <path d="M32,44 l10,10 l22,-22" fill="none" stroke={stroke} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),

  // B. Points coin — +5 pts (matches pill in DailyRewards)
  PointsCoin: ({ size = 80, points = 5, fill = '#F2B2C7', stroke = INK }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="42" fill={fill} stroke={stroke} strokeWidth="1.8"/>
      <circle cx="50" cy="50" r="34" fill="none" stroke={stroke} strokeWidth="1" strokeDasharray="2 3"/>
      <text x="50" y="62" textAnchor="middle" fontFamily="Fraunces, serif" fontWeight="700" fontSize="34" fill={stroke}>
        +{points}
      </text>
    </svg>
  ),

  // ---------- 4. MILESTONE ----------
  // A. Day badge — collectable numbered disc (matches profile "day 7/8/9…")
  DayBadge: ({ size = 80, day = 7, fill = '#9DC3E8', stroke = INK }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      {/* scalloped edge */}
      <g>
        {Array.from({ length: 16 }).map((_, i) => {
          const a = (i / 16) * Math.PI * 2;
          const x = 50 + Math.cos(a) * 44, y = 50 + Math.sin(a) * 44;
          return <circle key={i} cx={x} cy={y} r="5" fill={fill} stroke={stroke} strokeWidth="1.3"/>;
        })}
      </g>
      <circle cx="50" cy="50" r="36" fill="#FFFEF8" stroke={stroke} strokeWidth="1.5"/>
      <text x="50" y="46" textAnchor="middle" fontFamily="DM Sans, sans-serif" fontWeight="500" fontSize="9" letterSpacing="1.5" fill="#6E6763">DAY</text>
      <text x="50" y="70" textAnchor="middle" fontFamily="Fraunces, serif" fontWeight="700" fontSize="30" fill={stroke}>{day}</text>
    </svg>
  ),

  // B. Locked milestone — dashed outline + lock
  DayLocked: ({ size = 80, stroke = INK }) => (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="#EFE5CC" stroke={stroke} strokeWidth="1.4" strokeDasharray="3 3"/>
      <rect x="38" y="44" width="24" height="22" rx="4" fill="#FFFEF8" stroke={stroke} strokeWidth="1.5"/>
      <path d="M42,44 v-6 a8,8 0 0 1 16,0 v6" fill="none" stroke={stroke} strokeWidth="1.5"/>
      <circle cx="50" cy="55" r="2.5" fill={stroke}/>
    </svg>
  ),

  // ---------- 5. MODE ----------
  // A. Trying — droplet-in-ring (fertility)
  ModeTrying: ({ size = 80, fill = '#F2B2C7', stroke = INK }) => (

function ClickableProto({ mode, dark }) {
  const [active, setActive] = useState(() => localStorage.getItem('grandma-screen') || 'home-preg');
  useEffect(() => { localStorage.setItem('grandma-screen', active); }, [active]);
  const current = PROTO_SCREENS.find(s => s.key === active) || PROTO_SCREENS[0];
  const effMode = current.mode || mode;
  // Map central-menu picks to screen keys so the tab bar's center button actually routes.
  const menuMap = {
    insights:  effMode === 'kids' ? 'in-kids' : effMode === 'preg' ? 'in-preg' : 'in-pre',
    rewards:   effMode === 'kids' ? 'rw-kids' : effMode === 'preg' ? 'rw-preg' : 'rw-pre',
    garage:    'connections-garage',
    channels:  'connections-channels',
    talk:      'talk',
  };
  const onMenuPick = (key) => { const t = menuMap[key]; if (t) setActive(t); };
  const groups = {};
  PROTO_SCREENS.forEach(s => { (groups[s.group] = groups[s.group] || []).push(s); });
  return (
    <div>
      <div className="section-title">Clickable <em>prototype</em></div>
      <p className="section-sub">Pick a screen on the left. The phone on the right renders live with the current tweaks.</p>
      <div className="proto-stage">
        <div className="proto-nav">
          <h3>Screens</h3>
          {Object.entries(groups).map(([g, items]) => (
            <div key={g}>
              <div className="group">{g}</div>
              {items.map(s => (
                <div key={s.key} className={`item ${active===s.key?'active':''}`} onClick={() => setActive(s.key)}>
                  {s.label}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div style={{ display: 'grid', placeItems: 'center' }}>
          <div data-mode={effMode}>
            <Phone dark={dark} w={390} h={844}>
              <PhoneCtx.Provider value={{ onMenuPick, setActive }}>
                {current.render({ dark, mode: effMode, onMenuPick, setActive })}
              </PhoneCtx.Provider>
            </Phone>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---- Tweaks panel ----
function TweakPanel({ t, setT }) {
  const setKey = (k, v) => {
    const next = { ...t, [k]: v };
    setT(next);
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch(e) {}
  };
  const Row = ({ label, k, opts }) => (
    <div className="tweak-row">
      <label>{label}</label>
      <div className="opts">
        {opts.map(o => (
          <div key={o.v} className={`opt ${t[k]===o.v?'active':''}`} onClick={() => setKey(k, o.v)}>{o.l}</div>
        ))}
      </div>
    </div>
  );
  if (!t.__show) return null;
  return (
    <div className="tweak-panel">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <h4>Tweaks</h4>
        <div style={{ fontSize: 11, color: 'var(--ink-3)', cursor: 'pointer' }} onClick={() => setT({ ...t, __show: false })}>close</div>
      </div>
      <Row label="Theme" k="theme" opts={[{v:'light',l:'Light'},{v:'dark',l:'Dark'}]}/>
      <Row label="Mode" k="mode" opts={[{v:'pre',l:'Pre'},{v:'preg',l:'Preg'},{v:'kids',l:'Kids'}]}/>
      <Row label="Accent" k="accent" opts={[{v:'default',l:'Default'},{v:'coral',l:'Coral'},{v:'forest',l:'Forest'}]}/>
      <Row label="Serif" k="serifWeight" opts={[{v:'light',l:'Light'},{v:'regular',l:'Reg'},{v:'bold',l:'Bold'}]}/>
      <Row label="Stickers" k="stickerDensity" opts={[{v:'low',l:'Low'},{v:'medium',l:'Med'},{v:'high',l:'High'}]}/>
      <Row label="Radius" k="radius" opts={[{v:'soft',l:'Soft'},{v:'extra',l:'Extra'}]}/>
    </div>
  );
}

// ---- Main app ----
function App() {
  const [tab, setTab] = useState(() => localStorage.getItem('grandma-tab') || 'canvas');
  const [t, setT] = useState(() => {
    const saved = localStorage.getItem('grandma-tweaks');
    return { ...TWEAKS, __show: false, ...(saved ? JSON.parse(saved) : {}) };
  });

  useEffect(() => { localStorage.setItem('grandma-tab', tab); }, [tab]);
  useEffect(() => {
    localStorage.setItem('grandma-tweaks', JSON.stringify(t));
    localStorage.setItem('grandma-theme', t.theme);
    localStorage.setItem('grandma-mode', t.mode);
    document.documentElement.setAttribute('data-theme', t.theme);
    document.documentElement.setAttribute('data-mode', t.mode);
    // Accent variant override
    const root = document.documentElement;
    if (t.accent === 'coral') {
      root.style.setProperty('--accent', '#EE7B6D');
      root.style.setProperty('--accent-soft', '#F9D6C0');
    } else if (t.accent === 'forest') {
      root.style.setProperty('--accent', '#7AA47A');
      root.style.setProperty('--accent-soft', '#D4E0C9');
    } else {
      root.style.removeProperty('--accent');
      root.style.removeProperty('--accent-soft');
    }
    // Serif weight
    const w = { light: 400, regular: 600, bold: 800 }[t.serifWeight] || 600;
    root.style.setProperty('--display-weight', w);
    document.querySelectorAll('.display, h1, h3, .section-title').forEach(() => {});
    // Radius
    if (t.radius === 'extra') {
      root.style.setProperty('--r-lg', '36px');
      root.style.setProperty('--r-xl', '44px');
    } else {
      root.style.setProperty('--r-lg', '28px');
      root.style.setProperty('--r-xl', '36px');
    }
  }, [t]);

  // Edit-mode handshake
  useEffect(() => {
    const h = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setT(s => ({ ...s, __show: true }));
      if (e.data.type === '__deactivate_edit_mode') setT(s => ({ ...s, __show: false }));
    };
    window.addEventListener('message', h);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}
    return () => window.removeEventListener('message', h);
  }, []);

  const dark = t.theme === 'dark';

  return (
    <div className="app-shell" style={{ background: 'var(--bg)', minHeight: '100vh' }}>
      {/* hero */}
      <div className="hero">
        <div className="mono-caps" style={{ color: 'var(--ink-3)' }}>GRANDMA.APP · REDESIGN · APR 2026</div>
        <div style={{ position: 'absolute', top: 60, right: 80, transform: 'rotate(-8deg)' }}>
          <Stickers.Burst size={110} fill="var(--st-yellow)" points={12}/>
        </div>
        <div style={{ position: 'absolute', top: 140, right: 200, transform: 'rotate(18deg)' }}>
          <Stickers.Heart size={70} fill="var(--st-pink)"/>
        </div>
        <div style={{ position: 'absolute', top: 200, right: 40, transform: 'rotate(-14deg)' }}>
          <Stickers.Flower size={84} petal="var(--st-lilac)" center="var(--st-yellow)"/>
        </div>
        <h1>
          <span style={{ fontFamily: 'var(--font-italic)', fontStyle: 'italic', fontWeight: 400 }}>warm,</span> wise,<br/>a little <em>magical.</em>
        </h1>
        <p>A head-to-toe rethink of grandma.app on a cream paper canvas. Every screen, across the three life modes, with light &amp; dark themes, sticker-collage headers, and grandma's voice in the type.</p>
      </div>

      {/* tabs */}
      <div className="tabs">
        {[['canvas','Canvas overview'],['proto','Clickable prototype'],['system','Design system']].map(([k,l]) => (
          <button key={k} className={tab===k?'active':''} onClick={() => setTab(k)}>{l}</button>
        ))}
      </div>

      {tab==='canvas' && <Canvas mode={t.mode} dark={dark}/>}
      {tab==='proto' && <ClickableProto mode={t.mode} dark={dark}/>}
      {tab==='system' && <window.DesignSystemFull dark={dark}/>}

      <TweakPanel t={t} setT={setT}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
